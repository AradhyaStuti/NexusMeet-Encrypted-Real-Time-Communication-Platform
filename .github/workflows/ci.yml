name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install build tools for mediasoup
        run: sudo apt-get update && sudo apt-get install -y python3 python3-pip build-essential

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node --check src/app.js
          node --check src/controllers/socketManager.js
          node --check src/controllers/user.controller.js
          node --check src/routes/users.routes.js
          node --check src/utils/jwt.js
          node --check src/utils/logger.js
          node --check src/sfu/config.js
          node --check src/sfu/worker.js
          node --check src/sfu/room.js

      - name: Run tests
        run: node --test tests/

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx react-scripts test --watchAll=false --ci --passWithNoTests
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: false
