name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install build tools for mediasoup
        run: sudo apt-get update && sudo apt-get install -y python3 python3-pip build-essential

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node --check src/app.js
          node --check src/controllers/socketManager.js
          node --check src/controllers/socketHandlers/state.js
          node --check src/controllers/socketHandlers/chat.js
          node --check src/controllers/socketHandlers/sfu.js
          node --check src/controllers/user.controller.js
          node --check src/routes/users.routes.js
          node --check src/utils/jwt.js
          node --check src/utils/logger.js
          node --check src/sfu/config.js
          node --check src/sfu/worker.js
          node --check src/sfu/room.js

      - name: Run tests
        run: node --test tests/auth.test.js tests/logger.test.js tests/controller.test.js tests/room.test.js tests/socket.test.js tests/api.integration.test.js
        env:
          NODE_ENV: test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src --ext .js,.jsx --max-warnings=0
        env:
          CI: true

      - name: Run tests
        run: npx react-scripts test --watchAll=false --ci --passWithNoTests
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: false

  docker:
    name: Docker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose config --quiet

      - name: Build backend image
        run: docker build --target deps ./backend

      - name: Build frontend image
        run: docker build ./frontend
