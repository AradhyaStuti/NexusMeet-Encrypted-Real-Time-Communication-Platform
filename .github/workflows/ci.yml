name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Cache mongodb-memory-server binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-7.0

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Syntax check
        run: find src -name '*.js' | xargs -P4 -I{} node --check {}

      - name: Run tests
        run: node --test --test-force-exit tests/auth.test.js tests/logger.test.js tests/controller.test.js tests/room.test.js tests/socket.test.js tests/api.integration.test.js
        env:
          NODE_ENV: test
          RATE_LIMIT_MAX: 500

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src --ext .js,.jsx --max-warnings=0
        env:
          CI: true

      - name: Run tests
        run: npx react-scripts test --watchAll=false --ci --passWithNoTests
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: false

  docker:
    name: Docker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose config --quiet
        env:
          JWT_SECRET: ci-placeholder-not-used-in-production

      - name: Build backend image
        run: docker build --target deps ./backend

      - name: Build frontend image
        run: docker build ./frontend
