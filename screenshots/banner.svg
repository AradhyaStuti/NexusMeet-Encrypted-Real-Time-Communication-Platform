<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#040d18"/>
      <stop offset="50%" stop-color="#071a2e"/>
      <stop offset="100%" stop-color="#040d18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle glow behind logo -->
  <ellipse cx="200" cy="200" rx="180" ry="180" fill="url(#glow)"/>

  <!-- Grid dots pattern -->
  <g opacity="0.06">
    <circle cx="50" cy="50" r="1.5" fill="white"/>
    <circle cx="100" cy="50" r="1.5" fill="white"/>
    <circle cx="150" cy="50" r="1.5" fill="white"/>
    <circle cx="50" cy="100" r="1.5" fill="white"/>
    <circle cx="100" cy="100" r="1.5" fill="white"/>
    <circle cx="150" cy="100" r="1.5" fill="white"/>
    <circle cx="1050" cy="300" r="1.5" fill="white"/>
    <circle cx="1100" cy="300" r="1.5" fill="white"/>
    <circle cx="1150" cy="300" r="1.5" fill="white"/>
    <circle cx="1050" cy="350" r="1.5" fill="white"/>
    <circle cx="1100" cy="350" r="1.5" fill="white"/>
    <circle cx="1150" cy="350" r="1.5" fill="white"/>
  </g>

  <!-- Camera icon (logo) -->
  <g transform="translate(130, 145)">
    <!-- Logo background -->
    <rect width="110" height="110" rx="28" fill="url(#accent)"/>
    <rect x="2" y="2" width="106" height="106" rx="27" stroke="white" stroke-opacity="0.15" stroke-width="1.5" fill="none"/>

    <!-- Camera body -->
    <rect x="12" y="30" width="56" height="42" rx="9" fill="white" fill-opacity="0.95"/>
    <!-- Lens -->
    <circle cx="40" cy="51" r="14" fill="#0284c7"/>
    <circle cx="40" cy="51" r="8" fill="white" fill-opacity="0.9"/>
    <circle cx="36" cy="47" r="2.5" fill="white" fill-opacity="0.5"/>
    <!-- Viewfinder -->
    <rect x="30" y="22" width="12" height="10" rx="3" fill="white" fill-opacity="0.7"/>
    <!-- Record dot -->
    <circle cx="54" cy="35" r="3.5" fill="white" fill-opacity="0.55"/>
    <!-- Video wing -->
    <path d="M72 36 L96 51 L72 66 Z" fill="white" fill-opacity="0.92"/>
    <!-- X badge -->
    <circle cx="90" cy="86" r="15" fill="#040d18" fill-opacity="0.5"/>
    <circle cx="90" cy="86" r="14" fill="url(#accent)"/>
    <text x="90" y="92" text-anchor="middle" font-size="18" font-weight="800" font-family="'Segoe UI', system-ui, sans-serif" fill="white">X</text>
  </g>

  <!-- Title -->
  <text x="290" y="178" font-size="62" font-weight="800" font-family="'Segoe UI', system-ui, sans-serif" fill="#f0f6fc" letter-spacing="-1">
    MeetSync
  </text>

  <!-- Subtitle -->
  <text x="290" y="220" font-size="20" font-weight="400" font-family="'Segoe UI', system-ui, sans-serif" fill="#8b9ab0">
    Video Conferencing with WebRTC, SFU &amp; E2E Encryption
  </text>

  <!-- Tech pills -->
  <g transform="translate(290, 248)">
    <!-- React -->
    <rect x="0" y="0" width="72" height="28" rx="6" fill="#61DAFB" fill-opacity="0.12" stroke="#61DAFB" stroke-opacity="0.3" stroke-width="1"/>
    <text x="36" y="18" text-anchor="middle" font-size="11" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" fill="#61DAFB">React</text>

    <!-- Node -->
    <rect x="82" y="0" width="72" height="28" rx="6" fill="#339933" fill-opacity="0.12" stroke="#339933" stroke-opacity="0.3" stroke-width="1"/>
    <text x="118" y="18" text-anchor="middle" font-size="11" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" fill="#68d391">Node.js</text>

    <!-- MongoDB -->
    <rect x="164" y="0" width="80" height="28" rx="6" fill="#47A248" fill-opacity="0.12" stroke="#47A248" stroke-opacity="0.3" stroke-width="1"/>
    <text x="204" y="18" text-anchor="middle" font-size="11" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" fill="#68d391">MongoDB</text>

    <!-- WebRTC -->
    <rect x="254" y="0" width="72" height="28" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
    <text x="290" y="18" text-anchor="middle" font-size="11" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" fill="#c9d8e8">WebRTC</text>

    <!-- mediasoup -->
    <rect x="336" y="0" width="88" height="28" rx="6" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
    <text x="380" y="18" text-anchor="middle" font-size="11" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" fill="#a78bfa">mediasoup</text>

    <!-- E2E -->
    <rect x="434" y="0" width="52" height="28" rx="6" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
    <text x="460" y="18" text-anchor="middle" font-size="11" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" fill="#34d399">E2E</text>
  </g>

  <!-- Feature icons row -->
  <g transform="translate(290, 310)" font-size="12" font-family="'Segoe UI', system-ui, sans-serif" fill="#8b9ab0">
    <text x="0" y="0" font-size="20">🎥</text><text x="28" y="0">Video</text>
    <text x="90" y="0" font-size="20">🖥️</text><text x="118" y="0">Screen Share</text>
    <text x="230" y="0" font-size="20">💬</text><text x="258" y="0">Chat</text>
    <text x="310" y="0" font-size="20">🔒</text><text x="338" y="0">Encrypted</text>
    <text x="430" y="0" font-size="20">👏</text><text x="458" y="0">Reactions</text>
    <text x="545" y="0" font-size="20">✋</text><text x="573" y="0">Hand Raise</text>
  </g>

  <!-- Decorative line -->
  <rect x="290" y="295" width="400" height="1" fill="url(#accent)" opacity="0.2" rx="0.5"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="1199" height="399" rx="12" stroke="white" stroke-opacity="0.05" stroke-width="1" fill="none"/>
</svg>
