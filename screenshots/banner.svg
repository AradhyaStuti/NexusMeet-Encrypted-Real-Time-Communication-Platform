<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#040d18"/>
      <stop offset="55%" stop-color="#071a2e"/>
      <stop offset="100%" stop-color="#040d18"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e2f4fd"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="300" cy="200" rx="320" ry="220" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="1000" cy="180" rx="260" ry="200" fill="url(#glow2)" filter="url(#blur2)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="133" x2="1280" y2="133" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="266" x2="1280" y2="266" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Decorative circles -->
  <circle cx="1160" cy="80" r="60" stroke="rgba(14,165,233,0.08)" stroke-width="1" fill="none"/>
  <circle cx="1160" cy="80" r="40" stroke="rgba(14,165,233,0.12)" stroke-width="1" fill="none"/>
  <circle cx="120" cy="340" r="50" stroke="rgba(56,189,248,0.06)" stroke-width="1" fill="none"/>
  <circle cx="120" cy="340" r="30" stroke="rgba(56,189,248,0.1)" stroke-width="1" fill="none"/>

  <!-- Logo mark (UshaMeetX camera icon) — centered-left -->
  <g transform="translate(200, 148)">
    <!-- Background rounded square -->
    <rect width="104" height="104" rx="26" fill="url(#logoGrad)"/>
    <!-- Inner glow ring -->
    <rect x="2" y="2" width="100" height="100" rx="24" stroke="white" stroke-opacity="0.15" stroke-width="2" fill="none"/>
    <!-- Camera body -->
    <rect x="9" y="31" width="56" height="40" rx="9" fill="white" fill-opacity="0.96"/>
    <!-- Lens outer -->
    <circle cx="37" cy="51" r="14" fill="url(#logoGrad)"/>
    <!-- Lens inner -->
    <circle cx="37" cy="51" r="8.5" fill="white" fill-opacity="0.92"/>
    <!-- Lens reflection -->
    <circle cx="33" cy="47" r="2.5" fill="white" fill-opacity="0.5"/>
    <!-- Viewfinder notch -->
    <rect x="28" y="21" width="12" height="12" rx="3.5" fill="white" fill-opacity="0.75"/>
    <!-- Record dot -->
    <circle cx="54" cy="35" r="3.5" fill="white" fill-opacity="0.6"/>
    <!-- Video wing -->
    <path d="M70 37 L94 51 L70 65 Z" fill="white" fill-opacity="0.94"/>
    <!-- X badge -->
    <circle cx="85" cy="83" r="15" fill="#040d18" fill-opacity="0.55"/>
    <circle cx="85" cy="83" r="14" fill="url(#logoGrad)"/>
    <text x="85" y="88.5" text-anchor="middle" font-size="15" font-weight="800" font-family="'Segoe UI', system-ui, sans-serif" fill="white" fill-opacity="0.95">X</text>
  </g>

  <!-- App name -->
  <text x="340" y="195" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="72" font-weight="800" letter-spacing="-2" fill="url(#textGrad)">
    UshaMeetX
  </text>

  <!-- Tagline -->
  <text x="342" y="242" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="22" font-weight="400" fill="rgba(139,154,176,0.75)" letter-spacing="0.3">
    HD Video Conferencing · WebRTC · Real-time Chat · Screen Share
  </text>

  <!-- Badges row -->
  <!-- React badge -->
  <rect x="342" y="272" width="90" height="26" rx="13" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="387" y="290" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#38bdf8">⚛ React</text>

  <!-- Node badge -->
  <rect x="442" y="272" width="100" height="26" rx="13" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="492" y="290" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#38bdf8">⬡ Node.js</text>

  <!-- WebRTC badge -->
  <rect x="552" y="272" width="104" height="26" rx="13" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="604" y="290" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#38bdf8">◈ WebRTC</text>

  <!-- MongoDB badge -->
  <rect x="666" y="272" width="108" height="26" rx="13" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="720" y="290" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#38bdf8">◉ MongoDB</text>

  <!-- Socket.io badge -->
  <rect x="784" y="272" width="108" height="26" rx="13" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="838" y="290" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#38bdf8">⚡ Socket.io</text>

  <!-- Bottom border accent -->
  <rect x="0" y="395" width="1280" height="5" fill="url(#logoGrad)" opacity="0.6"/>
  <rect x="0" y="397" width="1280" height="3" fill="url(#logoGrad)" opacity="0.3"/>
</svg>
